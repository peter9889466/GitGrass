server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gitgrass
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 20
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
            scope:
              - read:user
              - repo
          discord:
            client-id: ${DISCORD_CLIENT_ID:your-discord-client-id}
            client-secret: ${DISCORD_CLIENT_SECRET:your-discord-client-secret}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - identify
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/discord"
            client-name: Discord
        provider:
          discord:
            authorization-uri: https://discord.com/api/oauth2/authorize
            token-uri: https://discord.com/api/oauth2/token
            user-info-uri: https://discord.com/api/users/@me
            user-name-attribute: username
